services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invmmc
      POSTGRES_USER: invmmc
      POSTGRES_PASSWORD: invmmc
    ports:
      - "5432:5432"
    volumes:
      - invmmc_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  invmmc_postgres:
