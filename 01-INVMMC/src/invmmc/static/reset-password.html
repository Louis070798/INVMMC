<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đặt lại mật khẩu - INVMMC Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --primary: #0284c7;
      --primary-hover: #0369a1;
      --text: #0f172a;
      --text-muted: #64748b;
      --line: #e2e8f0;
      --radius: 16px;
    }

    body {
      align-items: center;
      background: var(--bg);
      background-image:
        linear-gradient(rgba(2, 132, 199, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(2, 132, 199, 0.015) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text);
      display: flex;
      font-family: 'Plus Jakarta Sans', Inter, system-ui, -apple-system, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    form {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04), 0 20px 48px rgba(15, 23, 42, 0.04);
      display: grid;
      gap: 18px;
      max-width: 380px;
      padding: 32px;
      width: calc(100% - 32px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .brand-logo {
      background: var(--primary);
      color: white;
      height: 36px;
      width: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
    }

    p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 6px 0 0;
      line-height: 1.5;
    }

    label {
      display: grid;
      font-size: 13px;
      font-weight: 600;
      gap: 6px;
      color: var(--text-muted);
    }

    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      min-height: 42px;
      padding: 0 12px;
      color: var(--text);
      background-color: #fafbfc;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.08);
    }

    button {
      background: var(--primary);
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 44px;
      transition: background-color 0.2s;
      margin-top: 8px;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      font-size: 13px;
    }

    .back-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .notice {
      font-size: 13px;
      font-weight: 600;
      min-height: 18px;
    }

    .notice.success {
      color: #16a34a;
    }

    .notice.error {
      color: #ef4444;
    }
  </style>
</head>

<body>
  <form id="resetForm">
    <div>
      <div class="brand">
        <span class="brand-logo">⚡</span>
        <span>INVMMC Finance</span>
      </div>
      <h1 style="margin-top: 12px;">Đặt mật khẩu mới</h1>
      <p>Nhập mật khẩu mới cho tài khoản của bạn.</p>
    </div>
    <label>
      Mật khẩu mới
      <input name="new_password" autocomplete="new-password" required type="password" minlength="8"
        placeholder="Tối thiểu 8 ký tự" />
    </label>
    <label>
      Nhập lại mật khẩu mới
      <input name="confirm_password" autocomplete="new-password" required type="password" minlength="8"
        placeholder="Nhập lại mật khẩu ở trên" />
    </label>
    <div class="notice" id="notice"></div>
    <button type="submit" id="submitBtn">Đặt lại mật khẩu</button>
    <div class="back-link"><a href="/login">← Quay lại đăng nhập</a></div>
  </form>
  <script>
    const form = document.querySelector("#resetForm");
    const noticeEl = document.querySelector("#notice");
    const submitBtn = document.querySelector("#submitBtn");
    const token = new URLSearchParams(window.location.search).get("token");

    if (!token) {
      noticeEl.textContent = "Liên kết không hợp lệ - thiếu token. Hãy yêu cầu lại từ trang quên mật khẩu.";
      noticeEl.classList.add("error");
      submitBtn.disabled = true;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      noticeEl.textContent = "";
      noticeEl.className = "notice";
      const data = new FormData(form);
      const newPassword = data.get("new_password");
      const confirmPassword = data.get("confirm_password");

      if (newPassword !== confirmPassword) {
        noticeEl.textContent = "Hai mật khẩu nhập vào không khớp nhau.";
        noticeEl.classList.add("error");
        return;
      }

      submitBtn.disabled = true;
      try {
        const response = await fetch("/api/v1/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: newPassword }),
        });
        if (!response.ok) {
          const raw = await response.text();
          throw new Error(raw.includes("invalid_or_expired_token") ? "expired" : "failed");
        }
        noticeEl.textContent = "Đặt lại mật khẩu thành công! Đang chuyển tới trang đăng nhập...";
        noticeEl.classList.add("success");
        form.querySelectorAll("input, button").forEach((el) => (el.disabled = true));
        setTimeout(() => {
          window.location.href = "/login";
        }, 1800);
      } catch (error) {
        noticeEl.textContent = error.message === "expired"
          ? "Liên kết đã hết hạn hoặc đã được sử dụng. Hãy yêu cầu liên kết mới."
          : "Không thể đặt lại mật khẩu. Vui lòng thử lại.";
        noticeEl.classList.add("error");
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
